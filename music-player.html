<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Music Player</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e5e5e5;
  text-align: center;
  margin: 0;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

.player {
  max-width: 500px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 10px 15px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

button.stop {
  background: #dc2626;
}

button.stop:hover {
  background: #b91c1c;
}

ul {
  list-style: none;
  padding: 0;
  margin-top: 20px;
}

li {
  padding: 10px;
  margin: 5px 0;
  background: #111827;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

li:hover {
  background: #374151;
}

li.active {
  background: #22c55e;
  color: black;
}
</style>
</head>

<body>
<button onclick="window.location.href='index.html'">
⬅ Powrót
</button>
<h1>🎵 Music Player</h1>

<div class="player">

  <audio id="audio"></audio>

  <div>
    <button onclick="startSong()">▶ Start</button>
    <button class="stop" onclick="stopSong()">⏹ Stop</button>
  </div>

  <div>
    <button onclick="prevSong()">⬅ Prev</button>
    <button onclick="nextSong()">Next ➡</button>
  </div>

  <h3 id="nowPlaying">Nie wybrano utworu</h3>

  <ul id="playlist"></ul>
</div>

<script>
const songs = [
  "muzyka/song1.mp3",
  "muzyka/song2.mp3",
  "muzyka/song3.mp3"
];

let currentIndex = 0;

const audio = document.getElementById("audio");
const playlist = document.getElementById("playlist");
const nowPlaying = document.getElementById("nowPlaying");

function loadPlaylist() {
  playlist.innerHTML = "";

  songs.forEach((song, index) => {
    const li = document.createElement("li");
    li.textContent = "Utwór " + (index + 1);

    li.onclick = () => {
      currentIndex = index;
      playSong(); // 🔥 1 akcja tylko
    };

    playlist.appendChild(li);
  });

  highlight();
}

function loadSong() {
  audio.src = songs[currentIndex];
  nowPlaying.textContent =
    "Teraz gra: " + songs[currentIndex].split("/").pop();
  highlight();
}

function playSong() {
  loadSong();        // ustaw źródło
  audio.load();      // wymusza reload (ważne na mobile)

  audio.play().catch(err => {
    console.log("Play blocked:", err);
  });
}

function stopSong() {
  audio.pause();
  audio.currentTime = 0;
}

function nextSong() {
  currentIndex = (currentIndex + 1) % songs.length;
  playSong();
}

function prevSong() {
  currentIndex = (currentIndex - 1 + songs.length) % songs.length;
  playSong();
}

function highlight() {
  document.querySelectorAll("li").forEach((li, i) => {
    li.classList.toggle("active", i === currentIndex);
  });
}

loadPlaylist();
loadSong();
</script>

</body>
</html>
