<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Music Player</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
  padding: 20px;
}

.player {
  max-width: 500px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

button {
  padding: 12px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #2563eb;
  color: white;
  font-size: 16px;
}

button.stop {
  background: #dc2626;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: #111827;
  margin: 8px 0;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

li.active {
  background: #22c55e;
  color: black;
}
</style>
</head>

<body>

<h1>🎵 Music Player</h1>

<button onclick="window.location.href='index.html'">⬅ Powrót</button>

<div class="player">

  <audio id="audio"></audio>

  <div>
    <button onclick="play()">▶ Play</button>
    <button class="stop" onclick="stop()">⏹ Stop</button>
  </div>

  <div>
    <button onclick="prev()">⬅ Prev</button>
    <button onclick="next()">Next ➡</button>
  </div>

  <h3 id="now">Brak utworu</h3>

  <ul id="list"></ul>

</div>

<script>
const songs = [
  "muzyka/song1.wav",
  "muzyka/song2.wav",
  "muzyka/song3.mp3"
];

let index = 0;

const audio = document.getElementById("audio");
const list = document.getElementById("list");
const now = document.getElementById("now");

function load() {
  audio.src = songs[index];
  now.textContent = songs[index].split("/").pop();
  highlight();
}

function play() {
  audio.play().catch(e => {
    console.log("blocked:", e);
  });
}

function stop() {
  audio.pause();
  audio.currentTime = 0;
}

function next() {
  index = (index + 1) % songs.length;
  load();
  play();
}

function prev() {
  index = (index - 1 + songs.length) % songs.length;
  load();
  play();
}

// lista
songs.forEach((s, i) => {
  const li = document.createElement("li");
  li.textContent = "Utwór " + (i + 1);

  li.onclick = () => {
    index = i;
    load();
    play();
  };

  list.appendChild(li);
});

function highlight() {
  document.querySelectorAll("li").forEach((li, i) => {
    li.classList.toggle("active", i === index);
  });
}

load();
</script>

</body>
</html>
